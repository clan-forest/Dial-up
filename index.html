<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dial-Up Browser</title>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>body{
    margin:0;
    font-family:Arial,sans-serif;
    color:white;
    text-align:center;

    /* Background image */
    background-image:url("IMG_0378.webp");

    /* Make it fill the whole screen */
    background-size:cover;
    background-position:center;
    background-repeat:repeat;
    background-attachment:fixed;
}

h4"welcome to the 90s"

h1{margin-top:25px}

.window{
  margin:30px auto;
  width:90%;
  max-width:430px;
  background:#ece9d8;
  color:black;
  border:3px solid #245edb;
  border-radius:8px;
  overflow:hidden;
}

.title{
  background:linear-gradient(#2b77e5,#1747a8);
  color:white;
  padding:10px;
  font-weight:bold;
  text-align:left;
}

.content{padding:20px}

input{
  width:90%;
  padding:12px;
  font-size:16px;
  margin-bottom:10px;
}

button{
  background-color:#0A64AD;
  color:white;
  border:1px solid #003C74;
  padding:10px 20px;
  border-radius:4px;
  cursor:pointer;
  font-size:16px;
  margin:4px;
}

button:hover{
  background-color:#2B7CD3;
}

#status{
  margin-top:15px;
  font-weight:bold;
  font-size:18px;
}

.small{
  font-size:14px;
  color:#333;
}

#reader{
  display:none;
  margin:15px auto;
  width:300px;
}
</style>
</head>

<body>

<h1>📞 Dial-Up Browser 🌐</h1>

<div class="window">
  <div class="title">Connect to the Internet</div>

  <div class="content">
    <p>Enter a website or scan a QR code:</p>

    <input id="url" placeholder="example.com">

    <br>

    <button onclick="connect()">Connect</button>
    <button onclick="startQR()">📷 Scan QR</button>

    <div id="reader"></div>

    <p id="status">Not connected</p>

    <p class="small">
      Do not change the website while connecting, or it will fail.
    </p>
  </div>
</div>

<audio id="dialup" preload="auto">
  <source src="dialup.mp3.m4a" type="audio/mp4">
</audio>

<audio id="failSound" preload="auto">
  <source src="Dialupfail.mp3.m4a" type="audio/mp4">
</audio>

<script>
let qrScanner = null;

function connect() {
  const status = document.getElementById("status");
  const sound = document.getElementById("dialup");
  const failSound = document.getElementById("failSound");
  const urlBox = document.getElementById("url");

  let typedWebsite = urlBox.value.trim();

  if (typedWebsite === "") {
    status.textContent = "Please type or scan a website first.";
    return;
  }

  const originalText = urlBox.value;
  let url = typedWebsite;

  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    url = "https://" + url;
  }

  const randomFail = Math.random() < 0.10;
  let cancelled = false;

  sound.pause();
  sound.currentTime = 0;

  failSound.pause();
  failSound.currentTime = 0;

  status.textContent = "Dialing...";

  sound.play().catch(function() {
    status.textContent = "Tap Connect again to allow sound.";
  });

  const watcher = setInterval(function() {
    if (urlBox.value !== originalText) {
      cancelled = true;
      clearInterval(watcher);

      sound.pause();
      sound.currentTime = 0;

      status.textContent = "😵 Connection failed. Website was changed.";

      failSound.currentTime = 0;
      failSound.play().catch(function() {});
    }
  }, 100);

  setTimeout(function() {
    if (!cancelled) status.textContent = "Checking username and password...";
  }, 5000);

  setTimeout(function() {
    if (!cancelled) status.textContent = "Verifying connection...";
  }, 10000);

  setTimeout(function() {
    if (!cancelled) status.textContent = "Negotiating connection...";
  }, 15000);

  setTimeout(function() {
    if (!cancelled) status.textContent = "Connecting at 56.0 Kbps...";
  }, 20000);

  sound.onended = function() {
    clearInterval(watcher);

    if (cancelled) return;

    if (randomFail) {
      const errors = [
        "No dial tone.",
        "Line busy.",
        "Remote computer did not answer.",
        "Connection timed out.",
        "Modem lost carrier.",
        "Error 678: Remote computer did not respond."
      ];

      status.textContent =
        "😵 " + errors[Math.floor(Math.random() * errors.length)];

      failSound.currentTime = 0;
      failSound.play().catch(function() {});
      return;
    }

    status.textContent = "🛜 Success!";
    window.location.href = url;
  };
}

function startQR() {
  const reader = document.getElementById("reader");
  const status = document.getElementById("status");

  reader.style.display = "block";
  status.textContent = "Point camera at a QR code...";

  if (qrScanner) {
    qrScanner.clear();
  }

  qrScanner = new Html5Qrcode("reader");

  qrScanner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 220
    },
    function(decodedText) {
      document.getElementById("url").value = decodedText;
      status.textContent = "🛜 QR code scanned! Press Connect.";

      qrScanner.stop();
      reader.style.display = "none";
    },
    function(error) {}
  ).catch(function() {
    status.textContent = "Camera could not start.";
  });
}
</script>

</body>
</html>

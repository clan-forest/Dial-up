<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dial-Up Browser</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(#3a6ea5, #1f3f73);
  color: white;
  text-align: center;
}

h1 {
  margin-top: 30px;
}

.window {
  margin: 40px auto;
  width: 90%;
  max-width: 420px;
  background: #ece9d8;
  color: black;
  border: 3px solid #245edb;
  border-radius: 8px;
  overflow: hidden;
}

.title {
  background: linear-gradient(#2b77e5, #1747a8);
  color: white;
  padding: 10px;
  font-weight: bold;
  text-align: left;
}

.content {
  padding: 20px;
}

input {
  width: 90%;
  padding: 12px;
  font-size: 16px;
  margin-bottom: 10px;
}

button {
  padding: 12px 25px;
  font-size: 16px;
  background: #0b63ce;
  color: white;
  border: none;
  border-radius: 5px;
}

#status {
  margin-top: 15px;
  font-weight: bold;
  font-size: 18px;
}

.small {
  font-size: 14px;
  color: #333;
}
</style>
</head>

<body>

<h1>📞 Dial-Up Browser</h1>

<div class="window">
  <div class="title">Connect to the Internet</div>

  <div class="content">
    <p>Enter a website:</p>

    <input id="url" placeholder="example.com">

    <br>

    <button onclick="connect()">Connect</button>

    <p id="status">Not connected</p>

    <p class="small">Sometimes the connection may fail.</p>
  </div>
</div>

<audio id="dialup" preload="auto">
  <source src="dialup.mp3.m4a" type="audio/mp4">
</audio>

<audio id="failSound" preload="auto">
  <source src="Dialupfail.mp2.m4a" type="audio/mp4">
</audio>

<script>
function connect() {
  const status = document.getElementById("status");
  const sound = document.getElementById("dialup");
  const failSound = document.getElementById("failSound");

  let url = document.getElementById("url").value.trim();

  if (url === "") {
    status.textContent = "Please type a website first.";
    return;
  }

  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    url = "https://" + url;
  }

  const failed = Math.random() < 0.30;

  sound.pause();
  sound.currentTime = 0;

  failSound.pause();
  failSound.currentTime = 0;

  status.textContent = "Dialing...";

  sound.play().catch(function() {
    status.textContent = "Tap Connect again to allow sound.";
  });

  setTimeout(function() {
    status.textContent = "Checking username and password...";
  }, 5000);

  setTimeout(function() {
    status.textContent = "Verifying connection...";
  }, 10000);

  setTimeout(function() {
    status.textContent = "Negotiating connection...";
  }, 15000);

  setTimeout(function() {
    status.textContent = "Connecting at 56.0 Kbps...";
  }, 20000);

  sound.onended = function() {
    if (failed) {
      const errors = [
        "No dial tone.",
        "Line busy.",
        "Remote computer did not answer.",
        "Connection timed out.",
        "Modem lost carrier.",
        "Error 678: Remote computer did not respond."
      ];

      status.textContent = "😵 " + errors[Math.floor(Math.random() * errors.length)];

      failSound.currentTime = 0;
      failSound.play().catch(function() {});

      return;
    }

    status.textContent = "🛜 Connected!";
    window.location.href = url;
  };
}
</script>

</body>
</html>

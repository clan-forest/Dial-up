<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dial-Up Browser</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#3a6ea5, #1f3f73);
      color: white;
      text-align: center;
    }

    .window {
      margin: 40px auto;
      width: 90%;
      max-width: 420px;
      background: #ece9d8;
      color: black;
      border: 3px solid #245edb;
      border-radius: 8px;
      overflow: hidden;
    }

    .title {
      background: linear-gradient(#2b77e5, #1747a8);
      color: white;
      padding: 10px;
      font-weight: bold;
      text-align: left;
    }

    .content {
      padding: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 25px;
      font-size: 16px;
      background: #0b63ce;
      color: white;
      border: none;
      border-radius: 5px;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
    }

    iframe {
      width: 100%;
      height: 60vh;
      border: none;
      background: white;
      display: none;
    }
  </style>
</head>
<body>

  <h1>📞 Dial-Up Browser</h1>

  <div class="window">
    <div class="title">Connect to the Internet</div>

    <div class="content">
      <p>Enter a website:</p>

      <input id="url" placeholder="example.com">

      <br>

      <button onclick="connect()">Connect</button>

      <p id="status">Not connected</p>
    </div>
  </div>

  <iframe id="browser"></iframe>

  <audio id="dialup" src="dialup.mp3"></audio>

  <script>
    function connect() {
      const status = document.getElementById("status");
      const sound = document.getElementById("dialup");
      const browser = document.getElementById("browser");

      let url = document.getElementById("url").value.trim();

      if (url === "") {
        status.textContent = "Please type a website first.";
        return;
      }

      if (!url.startsWith("http://") && !url.startsWith("https://")) {
        url = "https://" + url;
      }

      browser.style.display = "none";

      sound.currentTime = 0;
      sound.play().catch(() => {});

      status.textContent = "Dialing...";

      setTimeout(() => {
        status.textContent = "Checking username and password...";
      }, 2500);

      setTimeout(() => {
        status.textContent = "Connecting at 56.0 Kbps...";
      }, 5000);

      setTimeout(() => {
        status.textContent = "Connected!";
        browser.src = url;
        browser.style.display = "block";
      }, 7500);
    }
  </script>

</body>
</html>
